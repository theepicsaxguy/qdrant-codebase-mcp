services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  semantic-code-index:
    build: .
    container_name: semantic-code-index
    ports:
      - "3000:3000"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - model_cache:/app/models
      # Mount your repo(s) as read-only
      # - /path/to/your/repo:/repos/my-repo:ro
    environment:
      - NODE_ENV=production
      - CONFIG_PATH=/app/config.yml
      - MODEL_CACHE_DIR=/app/models
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_storage:
  model_cache:
