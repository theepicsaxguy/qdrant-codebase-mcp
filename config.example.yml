qdrantUrl: http://localhost:6333
# qdrantApiKey: ""
embeddingModel: fast-bge-small-en-v1.5
chunkMaxLines: 150
chunkOverlapLines: 20
embeddingBatchSize: 64
watcherDebounceMs: 2000
maxFileSizeBytes: 1000000
minScore: 0.78 # Minimum similarity score for search results (0-1)
port: 3000
host: 0.0.0.0

repos:
  - repoId: my-repo
    collectionName: my-repo-code
    rootPath: /path/to/your/repo
    include:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.md'
    ignore:
      - '**/node_modules/**'
      - '**/dist/**'
