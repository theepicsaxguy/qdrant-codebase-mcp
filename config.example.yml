qdrantUrl: http://localhost:6333
# qdrantApiKey: ""
serverMode: index-and-watch
embeddingProvider: fastembed
embeddingModel: fast-bge-small-en-v1.5
# embeddingBaseUrl: https://your-openai-compatible-endpoint/v1
# embeddingApiKey: your-embedding-api-key
# embeddingDimensions: 1536
# embeddingHeaders:
#   x-foo: bar
chunkMaxLines: 150
chunkOverlapLines: 20
embeddingBatchSize: 64
watcherDebounceMs: 2000
maxFileSizeBytes: 1000000
minScore: 0.78 # Minimum similarity score for search results (0-1)
port: 3000
host: 0.0.0.0

repos:
  - repoId: my-repo
    collectionName: my-repo-code
    rootPath: /path/to/your/repo
    include:
      - '**/*.ts'
      - '**/*.js'
      - '**/*.md'
    ignore:
      - '**/node_modules/**'
      - '**/dist/**'

# Search-only example for an existing dedicated collection:
#
# qdrantUrl: https://your-cluster.qdrant.tech
# qdrantApiKey: your-api-key
# serverMode: search-only
# embeddingProvider: openai-compatible
# embeddingBaseUrl: https://your-openai-compatible-endpoint/v1
# embeddingApiKey: your-embedding-api-key
# embeddingModel: text-embedding-3-large
# repos:
#   - repoId: webdocuments
#     collectionName: webdocuments
