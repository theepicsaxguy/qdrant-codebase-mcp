name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create GitHub releases and tags
      pull-requests: write # open Version Packages PR
      id-token: write      # npm provenance attestation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # changesets needs full history

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # If there are pending changesets → open/update a "Version Packages" PR.
      # If this commit IS the merged version PR → publish.
      - name: Create version PR or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp-registry:
    name: Publish to MCP Registry
    needs: release
    runs-on: ubuntu-latest
    # Only run after a real publish (the version PR was just merged)
    if: needs.release.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Publish to MCP Registry
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Update version in registry manifest
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" mcp-registry.json
          npx mcp-publisher publish --token "$MCP_REGISTRY_TOKEN"
