name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  release:
    name: Version PR or publish
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create tags, push commits
      pull-requests: write # open/update the Version Packages PR
      id-token: write      # npm provenance attestation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # changesets needs full history to detect changes

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # changesets/action has two behaviours depending on the commit:
      #   • Pending changesets present → opens/updates a "Version Packages" PR
      #   • "Version Packages" PR was just merged → calls `publish` and we
      #     delegate to scripts/publish.sh --ci which handles all 3 platforms
      - name: Create version PR or publish to all platforms
        uses: changesets/action@v1
        with:
          publish: bash scripts/publish.sh --ci
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
