name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type-check · Lint · Format · Dead code · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check "src/**/*.ts" "tests/**/*.ts"

      - name: Dead code / unused exports
        run: npm run knip

      - name: Unit tests
        run: npm test

      - name: Python launcher tests
        run: npm run test:python

      - name: Install uv
        run: python -m pip install uv

      - name: uvx launcher smoke test
        env:
          QDRANT_CODEBASE_MCP_LAUNCHER_DRY_RUN: '1'
          QDRANT_CODEBASE_MCP_SOURCE_URL: ${{ github.workspace }}
          QDRANT_CODEBASE_MCP_SOURCE_COMMIT: ${{ github.sha }}
        run: uvx --from . qdrant-codebase-mcp

  security:
    name: Security audit · Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=moderate

      - name: Scan for secrets
        run: npx secretlint "**/*"

  dependency-review:
    name: Dependency review (PRs only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
