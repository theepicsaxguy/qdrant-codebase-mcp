version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch updates to reduce noise
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major updates need manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
